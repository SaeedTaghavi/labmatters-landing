  <path d="M249 166 v7 l-6 11 c-1.2 2.2 0.3 4.6 2.8 4.6 h8.4 c2.5 0 4 -2.4 2.8 -4.6 l-6 -11 v-7" fill="#eef4fe" stroke="#2f7cf6" stroke-width="1.8" stroke-linejoin="round"/>
